<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museu</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" type="text/css" href="../css/style.css">
  </head>
  
  <body style="background-color:#dab8ff">
  <header class=" navbar arco-iris-header py-1 text-center text-white">
        <div class="container">
            <h1>MASI</h1>
            <img src="../assets/icone.png" alt="ícone no formato do mundo pixelado com um carro dando a volta no mundo, um secador de cabelo, um pincel de arte com a paleta e brilhos rosa">
        </div>
    </header>

    <main  class="container mb-5">

<section class="d-flex flex-column justify-content-center align-items-center pt-4 pb-2">
    <h1 class="h1 mb-2">Bem vindo ao Museu de Arte Super Impressionante!</h1>
</section>

<section class="container pt-0 pb-4">
    <h2 class="text-center mb-4">Conheça os criadores:</h2>

    <div class="row justify-content-center g-4">

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card border-0 border-bottom border-primary shadow-sm overflow-hidden">
                <div class="card-body p-0">
                    <figure class="m-0 p-0">
                        <img class="img-fluid" loading="lazy" src="../assets/lilian.jpg" alt="Lilian Correia">
                        <figcaption class="m-0 p-4">
                            <h4 class="mb-1">Lilian Correia</h4>
                            <p class="text-secondary mb-0">Senac BCC</p>
                        </figcaption>
                    </figure>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card border-0 border-bottom border-primary shadow-sm overflow-hidden">
                <div class="card-body p-0">
                    <figure class="m-0 p-0">
                        <img class="img-fluid" loading="lazy" src="../assets/paulo.jpeg" alt="Paulo Rai">
                        <figcaption class="m-0 p-4">
                            <h4 class="mb-1">Paulo Rai</h4>
                            <p class="text-secondary mb-0">Senac BCC</p>
                        </figcaption>
                    </figure>
                </div>
            </div>
        </div>

    </div>
</section>

      <section class="d-flex flex-column justify-content-center align-items-center">
        <script src="../js/museu.js"></script>
      </section>
    </main>

  <footer class="bg-dark py-5">
        <div class="container text-white">
            <div class="row">
                <div class="col-3">
                    <h3>Teste fazer uma tela também:</h3>
                    <h4 style="color:rgb(255, 65, 169)" >Site p5.js</h4>
                    <a target="_blank" class="link-light link-offset-2 link-underline-opacity-0 link-underline-opacity-100-hover" href="https://editor.p5js.org/">Clique aqui!</a>
                </div>
                <div class="col d-flex justify-content-center align-items-center">
                    <ul>
                        <h3 style="color:rgb(65, 214, 255)">Nossas inspirações</h3>
                        <li>Jogos e desenhos dos anos 2000</li>
                        <li>Vanguardas artísticas</li>
                        <li>Carros</li>
                        <li>Matemática</li>
                    </ul>
                </div>
                <div class="col-3">
                    <h3>Siga o instagram do nosso curso!</h3>
                    <a target="_blank" style="color:rgb(255, 250, 90)" href="https://www.instagram.com/senac.bcc/">@senac.bcc</a>
                </div>
            </div>
        </div>
    </footer>
  </body>
</html>
